<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Jost:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <script>
    (function() {
      var saved = localStorage.getItem('theme') || 'auto';
      document.documentElement.setAttribute('data-theme', saved);
    })();
  </script>
</head>
<body>
  {% include nav.html %}

  <main class="main">
    {{ content }}
  </main>

  {% include footer.html %}
  {% include command-palette.html %}

  <script src="{{ '/assets/js/app.js' | relative_url }}"></script>
</body>
</html>
