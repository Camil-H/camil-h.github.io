---
layout: default
---
<article class="post">
  <header class="post-header">
    <div class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %d, %Y" }}</time>
      {% if page.category %}
      <span class="post-category post-category--{{ page.category }}">{{ page.category }}</span>
      {% endif %}
    </div>
    <h1 class="post-title">{{ page.title }}</h1>
    {% if page.subtitle %}
    <p class="post-subtitle">{{ page.subtitle }}</p>
    {% endif %}
  </header>
  <div class="post-content prose">
    {{ content }}
  </div>
  <footer class="post-footer">
    <a href="{{ '/' | relative_url }}" class="back-link">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 12L6 8L10 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Back to home
    </a>
  </footer>
</article>
